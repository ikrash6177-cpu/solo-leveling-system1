                <ellipse cx="266" cy="187" rx="10" ry="8" fill="white"/>
                <circle cx="240" cy="188" r="6.5" fill="#1a3210"/>
                <circle cx="267" cy="188" r="6.5" fill="#1a3210"/>
              </g>
            )}


            {tier===2 && (
              <g>
                <ellipse cx="252" cy="480" rx="90" ry="15" fill={c} opacity="0.18" filter={`url(#fbig${level})`}/>
                <path d="M188,146 Q252,118 316,146 L322,356 Q252,384 182,356Z" fill="#0e0820"/>
                <circle cx="252" cy="202" r="26" fill={c} opacity="0.45" filter={`url(#fg${level})`}/>
                <circle cx="252" cy="202" r="16" fill={c} opacity="0.9"/>
                <ellipse cx="252" cy="118" rx="34" ry="38" fill={`url(#sking${level})`}/>
                <ellipse cx="236" cy="116" rx="9" ry="6.5" fill={c} filter={`url(#fg${level})`}/>
                <ellipse cx="268" cy="116" rx="9" ry="6.5" fill={c} filter={`url(#fg${level})`}/>
              </g>
            )}


            {tier===3 && (
              <g>
                <ellipse cx="252" cy="478" rx="110" ry="18" fill={c} opacity="0.22" filter={`url(#fbig${level})`}/>
                <path d="M192,118 Q252,88 312,118 L318,358 Q252,384 186,358Z" fill="#060310"/>
                {[168,218,262].map((y,i)=>(
                  <g key={i}>
                    <circle cx="252" cy={y} r={20-i*4} fill={c} opacity={0.5-i*0.08} filter={`url(#fg${level})`}/>
                  </g>
                ))}
                <ellipse cx="252" cy="78" rx="34" ry="38" fill={`url(#sking${level})`}/>
                <ellipse cx="236" cy="80" rx="9.5" ry="7" fill={c} filter={`url(#fg${level})`}/>
                <ellipse cx="268" cy="80" rx="9.5" ry="7" fill={c} filter={`url(#fg${level})`}/>
              </g>
            )}


            {tier===4 && (
              <g>
                <circle cx="252" cy="230" r="170" fill={c} opacity="0.06" filter={`url(#fbig${level})`}/>
                <path d="M190,112 Q252,80 314,112 L320,360 Q252,388 184,360Z" fill="#040110"/>
                {[158,204,244,278].map((y,i)=>(
                  <g key={i}>
                    <circle cx="252" cy={y} r={22-i*3} fill={c} opacity={0.5-i*0.06} filter={`url(#fg${level})`}/>
                  </g>
                ))}
                <ellipse cx="252" cy="74" rx="36" ry="40" fill={`url(#sking${level})`}/>
                <ellipse cx="234" cy="74" rx="11" ry="8" fill={c} filter={`url(#fg${level})`}/>
                <ellipse cx="270" cy="74" rx="11" ry="8" fill={c} filter={`url(#fg${level})`}/>
              </g>
            )}


            <rect x="0" y="440" width="500" height="60" fill={`url(#groundg${level})`}/>
          </g>
        </svg>
      );
    }


    // ─── Cinematic Profile Card ──────────────────────────────────────────────
    function ProfileCard({ level, size="full" }) {
      const d = getLevelData(level);
      const c = d.color;
      const rankColor = RANK_COLORS[d.rank] || c;
      const isSmall = size === "mini";


      return (
        <div style={{
          position:"relative", width:"100%", aspectRatio:"1/1", borderRadius: isSmall?8:12, overflow:"hidden",
          border:`1px solid ${c}45`, boxShadow:`0 0 40px ${c}25, 0 0 80px ${c}10, inset 0 0 40px rgba(0,0,0,0.5)`
        }}>
          <AvatarIllustration level={level} size={500}/>


          <div style={{
            position:"absolute", top: isSmall?8:16, left: isSmall?8:16,
            background:"rgba(0,12,4,0.88)", border:`1.5px solid ${c}80`,
            borderRadius:4, padding: isSmall?"6px 10px":"14px 20px",
            backdropFilter:"blur(8px)", maxWidth: isSmall?"55%":"58%",
            boxShadow:`inset 0 0 24px ${c}12, 0 4px 20px rgba(0,0,0,0.6)`
          }}>
            <div style={{fontFamily:"'Rajdhani',monospace", fontSize: isSmall?11:22, fontWeight:700, color:c, letterSpacing: isSmall?1:2, marginBottom: isSmall?2:6, textShadow:`0 0 12px ${c}90`}}>
              LEVEL: {level}
            </div>
            <div style={{fontFamily:"'Rajdhani',sans-serif", fontSize: isSmall?8:13, fontWeight:600, color:`${c}cc`, lineHeight:1.35, letterSpacing:0.5}}>
              TITLE: {d.title}
            </div>
          </div>


          <div style={{
            position:"absolute", bottom: isSmall?8:14, right: isSmall?8:14,
            background:"rgba(0,0,0,0.8)", border:`1px solid ${rankColor}70`,
            borderRadius:3, padding: isSmall?"3px 8px":"5px 14px", backdropFilter:"blur(4px)"
          }}>
            <div style={{fontFamily:"'Rajdhani',sans-serif", fontSize: isSmall?8:11, color:rankColor, fontWeight:700, letterSpacing: isSmall?1:2.5, textShadow:`0 0 8px ${rankColor}80`}}>
              {d.rank}-RANK
            </div>
          </div>
        </div>
      );
    }


    // ─── XP / Level System Bar ───────────────────────────────────────────────
    function XPBar({ xp, level, color }) {
      const p = xpProgress(xp, level);
      const [w, setW] = useState(0);
      useEffect(()=>{ const t=setTimeout(()=>setW(p),100); return()=>clearTimeout(t); },[p]);
      return (
        <div style={{background:"rgba(255,255,255,0.05)", borderRadius:999, height:10, overflow:"hidden", border:`1px solid ${color}20`, position:"relative"}}>
          <div style={{height:"100%", borderRadius:999, width:`${w}%`, background:`linear-gradient(90deg, ${color}60, ${color})`, transition:"width 1.2s cubic-bezier(.22,1,.36,1)", position:"relative", overflow:"hidden", boxShadow:`0 0 14px ${color}80`}}>
            <div style={{position:"absolute", inset:0, background:"linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent)", animation:"shimmer 2.8s infinite"}}/>
          </div>
        </div>
      );
    }


    // ─── Level-Up Particles ──────────────────────────────────────────────────
    function Particles({ color }) {
      const p = Array.from({length:30}, (_,i)=>({
        id:i, x:50, y:50, vx:(Math.random()-0.5)*300, vy:-(Math.random()*200+50), r:Math.random()*5+2
      }));
      return (
        <div style={{position:"absolute", inset:0, pointerEvents:"none", overflow:"hidden"}}>
          {p.map(pt => (
            <div key={pt.id} style={{
              position:"absolute", left:`${pt.x}%`, top:`${pt.y}%`, width:pt.r, height:pt.r, borderRadius:"50%", background:color,
              animation:`burst 1.5s ease-out forwards`, "--dx":`${pt.vx}px`, "--dy":`${pt.vy}px`
            }}/>
          ))}
        </div>
      );
    }


    // ─── Level-Up Announcement Backdrop ──────────────────────────────────────
    function LevelUpModal({ level, onClose }) {
      const d = getLevelData(level);
      useEffect(()=>{ const t=setTimeout(onClose,5000); return()=>clearTimeout(t); },[]);
      return (
        <div onClick={onClose} style={{position:"fixed", inset:0, zIndex:2000, background:"rgba(0,0,0,0.95)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column"}}>
          <Particles color={d.color}/>
          <div style={{position:"relative", zIndex:2, textAlign:"center", animation:"popIn 0.6s cubic-bezier(.34,1.56,.64,1) both", width:"90%", maxWidth:400}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif", fontSize:12, letterSpacing:6, color:d.color, marginBottom:16, fontWeight:700}}>[ SYSTEM EVOLUTION ]</div>
            <div style={{boxShadow:`0 0 8px ${d.color}60`, borderRadius:14, marginBottom:24}}>
              <ProfileCard level={level}/>
            </div>
            <div style={{fontSize:24, color:"#fff", fontWeight:700, letterSpacing:2}}>LEVEL UP!</div>
            <div style={{fontSize:14, color:`${d.color}`, letterSpacing:1, marginTop:4}}>{d.title}</div>
          </div>
        </div>
      );
    }


    // ─── Objective Mission Cards ─────────────────────────────────────────────
    function MissionCard({ m, onComplete, onEdit, onDelete, color }) {
      const cc = CAT_C[m.category]||"#888";
      const done = m.status==="completed";
      return (
        <div style={{
          background:"rgba(255,255,255,0.02)", border:`1px solid ${done?"rgba(255,255,255,0.05)":color+"25"}`,
          borderRadius:12, padding:"16px", marginBottom:12, position:"relative", opacity:done?0.4:1, transition:"all 0.2s"
        }}>
          <div style={{position:"absolute", left:0, top:0, bottom:0, width:4, background:cc, borderRadius:"4px 0 0 4px"}}/>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <div style={{flex:1, minWidth:0, paddingLeft:8}}>
              <div style={{fontWeight:700, fontSize:17, color:"#eef0f8", letterSpacing:0.5}}>{m.title}</div>
              <div style={{fontSize:13, color:"#a0a5b5", margin:"4px 0 6px"}}>{m.description}</div>
              <div style={{display:"flex", gap:8, alignItems:"center", fontSize:11}}>
                <span style={{color:cc, fontWeight:700, letterSpacing:1}}>{m.category.toUpperCase()}</span>
                <span style={{color:color, fontWeight:700}}>+{m.xp} XP</span>
              </div>
            </div>
            <div style={{display:"flex", gap:6}}>
              {!done && (
                <button onClick={()=>onComplete(m.id)} style={{background:`${color}20`, border:`1px solid ${color}`, color:color, padding:"6px 12px", borderRadius:6, fontWeight:700}}>
                  ⚡ CLEAR
                </button>
              )}
              <button onClick={()=>onDelete(m.id)} style={{background:"rgba(239,68,68,0.1)", border:"1px solid #ef4444", color:"#ef4444", padding:"6px 10px", borderRadius:6}}>
                ✕
              </button>
            </div>
          </div>
        </div>
      );
    }


    // ─── Mission Addition Modal ──────────────────────────────────────────────
    function MissionModal({ mission, onSave, onClose, color }) {
      const [form, setForm] = useState(mission || {title:"", description:"", category:"Personal", xp:100});
      return (
        <div style={{position:"fixed", inset:0, zIndex:1000, background:"rgba(0,0,0,0.8)", display:"flex", alignItems:"flex-end", justifyContent:"center"}} onClick={onClose}>
          <div style={{width:"100%", maxWidth:500, background:"#080810", borderRadius:"20px 20px 0 0", padding:24, borderTop:`2px solid ${color}`} } onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:18, fontWeight:700, color:color, marginBottom:16}}>{mission?"EDIT SYSTEM GOAL":"NEW SYSTEM GOAL"}</div>
            <input value={form.title} onChange={e=>setForm({...form, title:e.target.value})} placeholder="Objective title..." style={{width:"100%", background:"#10101c", border:"1px solid #202035", padding:12, borderRadius:8, color:"#fff", marginBottom:12, outline:"none"}}/>
            <textarea value={form.description} onChange={e=>setForm({...form, description:e.target.value})} placeholder="Objective description details..." style={{width:"100%", background:"#10101c", border:"1px solid #202035", padding:12, borderRadius:8, color:"#fff", marginBottom:12, outline:"none", resize:"none"}} rows={2}/>
            
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16}}>
              <select value={form.category} onChange={e=>setForm({...form, category:e.target.value})} style={{background:"#10101c", border:"1px solid #202035", padding:12, borderRadius:8, color:"#fff"}}>
                {CATS.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <input type="number" value={form.xp} onChange={e=>setForm({...form, xp:parseInt(e.target.value)||0})} style={{background:"#10101c", border:"1px solid #202035", padding:12, borderRadius:8, color:color, fontWeight:700}}/>
            </div>


            <button onClick={()=>onSave(form)} style={{width:"100%", background:color, color:"#000", padding:14, borderRadius:8, fontWeight:700, letterSpacing:2}}>
              ENGAGE OBJECTIVE
            </button>
          </div>
        </div>
      );
    }


    // ─── Level Navigation Panel Tab ──────────────────────────────────────────
    function LevelsTab({ totalXP, level, onReset }) {
      const d = getLevelData(level);
      const color = d.color;
      const p = xpProgress(totalXP, level);
      return (
        <div style={{padding:"0 16px 100px"}} class="tab-in">
          <div style={{marginBottom:20}}><ProfileCard level={level}/></div>
          <div style={{background:"rgba(0,0,0,0.5)", border:`1px solid ${color}30`, padding:16, borderRadius:12, marginBottom:20}}>
            <div style={{display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:14}}>
              <span>TOTAL STAT XP: <strong>{totalXP}</strong></span>
              <span>NEXT LEVEL IN: <strong>{xpToNext(totalXP, level)} XP</strong></span>
            </div>
            <XPBar xp={totalXP} level={level} color={color}/>
          </div>
          <button onClick={onReset} style={{width:"100%", padding:12, background:"rgba(239,68,68,0.1)", border:"1px solid #ef4444", color:"#ef4444", borderRadius:8, fontWeight:700, fontSize:13}}>
            ↺ RESET ALL SYSTEM DATA
          </button>
        </div>
      );
    }


    // ─── Main Interface Entry Shell App ──────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("missions");
      const [totalXP, setTotalXP] = useState(() => parseInt(localStorage.getItem("iyi_xp") || "0"));
      const [missions, setMissions] = useState(() => JSON.parse(localStorage.getItem("iyi_tasks") || "[]"));
      const [modal, setModal] = useState(false);
      const [lvlUp, setLvlUp] = useState(null);
      const prevLvl = useRef(getLevel(totalXP));


      const level = getLevel(totalXP);
      const d = getLevelData(level);
      const color = d.color;


      useEffect(() => { localStorage.setItem("iyi_xp", totalXP); }, [totalXP]);
      useEffect(() => { localStorage.setItem("iyi_tasks", JSON.stringify(missions)); }, [missions]);


      const handleComplete = (id) => {
        const target = missions.find(m => m.id === id);
        if (!target) return;
        const nextXP = totalXP + target.xp;
        const nextLvl = getLevel(nextXP);
        
        setMissions(missions.map(m => m.id === id ? {...m, status:"completed"} : m));
        setTotalXP(nextXP);


        if (nextLvl > prevLvl.current) {
          setLvlUp(nextLvl);
          prevLvl.current = nextLvl;
        }
      };


      const handleSave = (form) => {
        setMissions([...missions, { ...form, id: Date.now().toString(), status: "pending" }]);
        setModal(false);
      };


      return (
        <div style={{maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#02020a", borderLeft:"1px solid #101025", borderRight:"1px solid #101025", position:"relative"}}>
          
          {/* Top Status Panel */}
          <div style={{padding:"24px 16px 12px", background:`linear-gradient(180deg, ${color}10 0%, transparent 100%)`, borderBottom:"1px solid #151525"}}>
            <div style={{display:"flex", alignItems:"center", justifyBetween:"space-between", gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Black Han Sans'", fontSize:28, letterSpacing:4, color:color}}>IYI</div>
                <div style={{fontSize:10, color:"#606575", letterSpacing:1}}>IMPROVE YOURSELF INFINITELY</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:700, color:color}}>{d.rank}-RANK</div>
                <div style={{fontSize:12, color:"#a0a5b5"}}>LV {level}</div>
              </div>
            </div>
            <div style={{marginTop:12}}><XPBar xp={totalXP} level={level} color={color}/></div>
          </div>


          {/* Navigation Systems tabs */}
          <div style={{display:"flex", borderBottom:"1px solid #151525", background:"#050510"}}>
            <button onClick={()=>setTab("missions")} style={{flex:1, padding:14, color:tab==="missions"?color:"#505565", borderBottom:tab==="missions"?`2px solid ${color}`:"none", fontWeight:700, fontSize:13}}>
              ⚔ OBJECTIVES
            </button>
            <button onClick={()=>setTab("levels")} style={{flex:1, padding:14, color:tab==="levels"?color:"#505565", borderBottom:tab==="levels"?`2px solid ${color}`:"none", fontWeight:700, fontSize:13}}>
              ★ HUNTER CARD
            </button>
          </div>


          {/* Main Body Switcher Routing Container */}
          <div style={{paddingTop:16}}>
            {tab === "missions" ? (
              <div style={{padding:"0 16px 120px"}} class="tab-in">
                {missions.length === 0 && (
                  <div style={{textAlign:"center", padding:"40px 0", color:"#404555", fontSize:14}}>No objectives synchronized. Access the [+] network matrix.</div>
                )}
                {missions.map(m => (
                  <MissionCard key={m.id} m={m} onComplete={handleComplete} onDelete={(id)=>setMissions(missions.filter(x=>x.id!==id))} color={color}/>
                ))}
                <button onClick={()=>setModal(true)} style={{position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", width:56, height:56, borderRadius:"50%", background:color, color:"#000", fontSize:28, border:"none", fontWeight:300, cursor:"pointer", boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>+</button>
              </div>
            ) : (
              <LevelsTab totalXP={totalXP} level={level} onReset={()=>{setTotalXP(0); setMissions([]); prevLvl.current=1;}}/>
            )}
          </div>


          {modal && <MissionModal color={color} onClose={()=>setModal(false)} onSave={handleSave}/>}
          {lvlUp && <LevelUpModal level={lvlUp} onClose={()=>setLvlUp(null)}/>}
        </div>
      );
    }


    // Render directly to View Engine Root Anchor
    const root = document.getElementById('root');
    ReactDOM.createRoot(root).render(<App />);
  </script>
</body>
</html>
